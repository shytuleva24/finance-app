<h1 class="auth-form-title" id="register-title">Sign Up</h1>

<form class="auth-form" (submit)="onSubmit($event)" novalidate aria-labelledby="register-title">
  <div class="auth-form-fields">
    <!-- Name -->
    <div class="auth-form-field">
      <app-text-input
        label="Name"
        inputId="name"
        placeholder="e.g. Alex Johnson"
        autocomplete="name"
        [value]="form.data().name"
        (valueChange)="form.updateField('name', $event)"
        [serverError]="form.errors().name"
        [validations]="nameValidations"
      />
    </div>

    <!-- Email -->
    <div class="auth-form-field">
      <app-text-input
        label="Email"
        inputId="email"
        type="email"
        placeholder="e.g. alex@example.com"
        autocomplete="email"
        [value]="form.data().email"
        (valueChange)="form.updateField('email', $event)"
        [serverError]="form.errors().email"
        [validations]="emailValidations"
      />
    </div>

    <!-- Password -->
    <div class="auth-form-field">
      <app-password-input
        label="Create Password"
        inputId="password"
        placeholder="Enter at least 8 characters"
        autocomplete="new-password"
        [value]="form.data().password"
        (valueChange)="form.updateField('password', $event)"
        [serverError]="form.errors().password"
        [validations]="passwordValidations"
      />
      <p class="auth-password-hint">Passwords must be at least 8 characters</p>
    </div>

    @if (form.globalError()) {
      <p class="auth-error" role="alert" aria-live="polite">
        {{ form.globalError() }}
      </p>
    }
  </div>

  <app-primary-button type="submit" [loading]="form.isSubmitting()" [disabled]="!form.isValid()">
    Create Account
  </app-primary-button>

  <p class="auth-form-footer">
    Already have an account?
    <a routerLink="/auth/login" class="auth-link"> Login </a>
  </p>
</form>
