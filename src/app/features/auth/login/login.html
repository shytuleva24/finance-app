<header class="auth-form-header">
  <h1 class="auth-form-title" id="login-title">Login</h1>
</header>

<form class="auth-form" (submit)="onSubmit($event)" novalidate aria-labelledby="login-title">
  <div class="auth-form-fields">
    <!-- Email -->
    <div class="auth-form-field">
      <app-text-input
        label="Email"
        inputId="email"
        type="email"
        placeholder="e.g. alex@example.com"
        autocomplete="email"
        [value]="form.data().email"
        (valueChange)="form.updateField('email', $event)"
        [serverError]="form.errors().email"
        [validations]="emailValidations"
      />
    </div>

    <!-- Password -->
    <div class="auth-form-field">
      <app-password-input
        label="Password"
        inputId="password"
        placeholder="Enter your password"
        autocomplete="current-password"
        [value]="form.data().password"
        (valueChange)="form.updateField('password', $event)"
        [serverError]="form.errors().password"
        [validations]="passwordValidations"
      />
    </div>

    @if (form.globalError()) {
      <p class="auth-error" role="alert" aria-live="polite">
        {{ form.globalError() }}
      </p>
    }
  </div>

  <app-primary-button type="submit" [loading]="form.isSubmitting()" [disabled]="!form.isValid()">
    Login
  </app-primary-button>

  <p class="auth-form-footer">
    Need to create an account?
    <a routerLink="/auth/sign-up" class="auth-link"> Sign Up </a>
  </p>
</form>
