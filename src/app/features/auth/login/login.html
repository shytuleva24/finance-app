<header class="auth-form-header">
  <h1 class="auth-form-title" id="login-title">Login</h1>
</header>

<form class="auth-form" (submit)="onSubmit($event)" novalidate aria-labelledby="login-title">
  <div class="auth-form-fields">
    <!-- Email -->
    <div class="auth-form-field">
      <app-text-input
        label="Email"
        inputId="email"
        type="email"
        placeholder="e.g. alex@example.com"
        autocomplete="email"
        [value]="loginData().email"
        (valueChange)="updateEmail($event)"
        [error]="form.email().errors()[0]?.message || null"
        [touched]="form.email().touched()"
        [maxLength]="MAX_TEXT_LENGTH"
      />
    </div>

    <!-- Password -->
    <div class="auth-form-field">
      <app-password-input
        label="Password"
        inputId="password"
        placeholder="Enter your password"
        autocomplete="current-password"
        [value]="loginData().password"
        (valueChange)="updatePassword($event)"
        [error]="form.password().errors()[0]?.message || null"
        [touched]="form.password().touched()"
        [maxLength]="MAX_TEXT_LENGTH"
      />
    </div>

    @if (errorMessage()) {
      <p class="auth-error" role="alert" aria-live="polite">
        {{ errorMessage() }}
      </p>
    }
  </div>

  <app-primary-button type="submit" [loading]="isSubmitting()" [disabled]="form().invalid()">
    Login
  </app-primary-button>

  <p class="auth-form-footer">
    Need to create an account?
    <a routerLink="/auth/sign-up" class="auth-link"> Sign Up </a>
  </p>
</form>
