<app-modal [isOpen]="isOpen()" (closed)="close()" title="Add Transaction">
  <form [formGroup]="form">
    <div class="form-group">
      <label for="transactionType">Transaction Type</label>
      <div class="type-selector">
        <label>
          <input type="radio" formControlName="type" value="expense" />
          <span>Expense</span>
        </label>
        <label>
          <input type="radio" formControlName="type" value="income" />
          <span>Income</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="categoryId">Category</label>
      <select id="categoryId" formControlName="categoryId" class="select-input">
        <option value="" disabled>Select a category</option>
        <!--        @for (cat of filteredCategories(); track cat.id) {-->
        <!--          <option [value]="cat.id">{{ cat.name }}</option>-->
        <!--        }-->
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount</label>
        <input
          id="amount"
          type="number"
          formControlName="amount"
          class="text-input"
          placeholder="0.00"
        />
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input id="date" type="date" formControlName="date" class="text-input" />
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input
        id="description"
        type="text"
        formControlName="description"
        class="text-input"
        placeholder="What was this for?"
      />
    </div>

    <div class="actions">
      <app-primary-button type="submit" [disabled]="form.invalid">
        Add Transaction
      </app-primary-button>
    </div>
  </form>
</app-modal>
