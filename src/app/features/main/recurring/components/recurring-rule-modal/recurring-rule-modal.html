<app-modal [isOpen]="isOpen()" (closed)="close()" title="Add Recurring Rule">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="title">Title</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        class="text-input"
        placeholder="e.g. Monthly Rent"
      />
    </div>

    <div class="form-group">
      <fieldset>
        <legend>Type</legend>
        <div class="type-selector">
          <label>
            <input type="radio" formControlName="type" value="expense" />
            <span>Expense</span>
          </label>
          <label>
            <input type="radio" formControlName="type" value="income" />
            <span>Income</span>
          </label>
        </div>
      </fieldset>
    </div>

    <div class="form-group">
      <label for="categoryId">Category</label>
      <select id="categoryId" formControlName="categoryId" class="select-input">
        <option value="" disabled>Select a category</option>
        <!--        @for (cat of filteredCategories(); track cat.id) {-->
        <!--          <option [value]="cat.id">{{ cat.name }}</option>-->
        <!--        }-->
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount</label>
        <input
          id="amount"
          type="number"
          formControlName="amount"
          class="text-input"
          placeholder="0.00"
        />
      </div>
      <div class="form-group">
        <label for="currency">Currency</label>
        <select id="currency" formControlName="currency" class="select-input">
          @for (curr of currencies; track curr.code) {
            <option [value]="curr.code">{{ curr.code }} ({{ curr.symbol }})</option>
          }
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dayOfMonth">Day of Month (1-31)</label>
        <input id="dayOfMonth" type="number" formControlName="dayOfMonth" class="text-input" />
      </div>
      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input id="startDate" type="date" formControlName="startDate" class="text-input" />
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description (Optional)</label>
      <textarea
        id="description"
        formControlName="description"
        class="text-input textarea"
        placeholder="e.g. Loan to Nick until 10th"
        rows="3"
      ></textarea>
    </div>

    <div class="actions">
      <app-primary-button type="submit" [disabled]="form.invalid"> Create Rule </app-primary-button>
    </div>
  </form>
</app-modal>
