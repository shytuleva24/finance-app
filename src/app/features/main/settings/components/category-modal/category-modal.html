<app-modal
  [isOpen]="isOpen()"
  (closed)="close()"
  [title]="isEditMode() ? 'Edit Category' : 'Add New Category'"
>
  <form (submit)="$event.preventDefault(); submit()">
    <div class="form-group">
      <app-text-input
        label="Category Name"
        inputId="name"
        placeholder="e.g. Groceries"
        [value]="form.data().name"
        (valueChange)="form.updateField('name', $event)"
        [maxLength]="MAX_TEXT_LENGTH"
        [validations]="nameValidations"
        [serverError]="form.errors().name"
      />
    </div>

    <div class="form-group">
      <fieldset>
        <legend>Type</legend>
        <div class="type-selector">
          <label>
            <input
              type="radio"
              name="categoryType"
              [checked]="form.data().type === 'OUTCOME'"
              (change)="form.updateField('type', 'OUTCOME')"
            />
            <span>Expense</span>
          </label>
          <label>
            <input
              type="radio"
              name="categoryType"
              [checked]="form.data().type === 'INCOME'"
              (change)="form.updateField('type', 'INCOME')"
            />
            <span>Income</span>
          </label>
        </div>
      </fieldset>
    </div>

    <div class="form-group">
      <fieldset>
        <legend>Color Tag</legend>
        <div class="color-grid">
          @for (c of availableColors; track c.color) {
            <button
              type="button"
              class="color-option"
              [style.background-color]="c.color"
              [class.selected]="form.data().color === c.color"
              [class.used]="isColorUsed(c.color)"
              (click)="selectColor(c.color)"
              [title]="c.name + (isColorUsed(c.color) ? ' (Already in use)' : '')"
            >
              @if (form.data().color === c.color) {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              } @else if (isColorUsed(c.color)) {
                <div class="used-indicator"></div>
              }
            </button>
          }
        </div>
      </fieldset>
    </div>

    <div class="actions">
      <app-primary-button
        type="submit"
        [disabled]="!form.isValid()"
        [loading]="form.isSubmitting()"
      >
        {{ isEditMode() ? 'Save Changes' : 'Add Category' }}
      </app-primary-button>
    </div>
  </form>
</app-modal>
