<app-modal
  [isOpen]="isOpen()"
  (closed)="close()"
  [title]="isEditMode() ? 'Edit Category' : 'Add New Category'"
>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="name">Category Name</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        class="text-input"
        placeholder="e.g. Groceries"
      />
    </div>

    <div class="form-group">
      <label>Type</label>
      <div class="type-selector">
        <label>
          <input type="radio" formControlName="type" value="expense" />
          <span>Expense</span>
        </label>
        <label>
          <input type="radio" formControlName="type" value="income" />
          <span>Income</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Color Tag</label>
      <div class="color-grid">
        @for (c of availableColors; track c.color) {
          <button
            type="button"
            class="color-option"
            [style.background-color]="c.color"
            [class.selected]="form.get('color')?.value === c.color"
            (click)="selectColor(c.color)"
            [title]="c.name"
          >
            @if (form.get('color')?.value === c.color) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            }
          </button>
        }
      </div>
    </div>

    <div class="actions">
      <app-primary-button type="submit" [disabled]="form.invalid">
        {{ isEditMode() ? 'Save Changes' : 'Add Category' }}
      </app-primary-button>
    </div>
  </form>
</app-modal>
