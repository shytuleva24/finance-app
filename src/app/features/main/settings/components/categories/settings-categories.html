<div class="settings-categories">
  <div class="header">
    <div class="title-row">
      <h2>Manage Categories</h2>
      <app-primary-button className="btn-add" (click)="openAddModal()">
        + Add New Category
      </app-primary-button>
    </div>
    <p>Define categories for your transactions and budgets.</p>
  </div>

  @if (error()) {
    <div class="bg-red-100 text-red-700 p-4 rounded-lg mb-6">Failed to load categories.</div>
  }

  @if (loading()) {
    <div class="text-center py-12 text-gray-500 animate-pulse">Loading categories...</div>
  } @else {
    <ng-template #categoryList let-list>
      <div class="category-list">
        @for (cat of list; track cat.id) {
          <div class="category-item">
            <div class="color-indicator" [style.background-color]="cat.color"></div>

            <span class="name">{{ cat.name }}</span>

            <div class="actions">
              <button class="btn-icon edit" (click)="openEditModal(cat)" title="Edit">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                  <path d="m15 5 4 4" />
                </svg>
              </button>

              <button class="btn-icon delete" (click)="deleteCategory(cat.id)" title="Delete">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 6h18" />
                  <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                  <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                  <line x1="10" x2="10" y1="11" y2="17" />
                  <line x1="14" x2="14" y1="11" y2="17" />
                </svg>
              </button>
            </div>
          </div>
        } @empty {
          <p>No categories found.</p>
        }
      </div>
    </ng-template>

    <!-- Expenses -->
    <section class="category-group">
      <h3>Expenses</h3>
      <ng-container
        [ngTemplateOutlet]="categoryList"
        [ngTemplateOutletContext]="{ $implicit: expenseCategories() }"
      />
    </section>

    <!-- Income -->
    <section class="category-group">
      <h3>Income</h3>
      <ng-container
        [ngTemplateOutlet]="categoryList"
        [ngTemplateOutletContext]="{ $implicit: incomeCategories() }"
      />
    </section>
  }
</div>

<app-category-modal />
<app-confirm-action-dialog
  [isOpen]="isDeleteModalOpen()"
  [title]="'Delete \'' + categoryToDeleteName() + '\''"
  [description]="'Are you sure you want to delete this category? This action cannot be undone and may affect your transactions.'"
  confirmText="Delete Category"
  confirmVariant="danger"
  (closed)="closeDeleteModal()"
  (confirmed)="onConfirmDelete()"
/>
