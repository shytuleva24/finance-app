<div class="budget-card">
  <div class="header">
    <div class="title-group">
      <div class="color-indicator" [style.background-color]="budget().theme"></div>
      <!--      <h2>{{ category()?.name }}</h2>-->
    </div>
    <div class="actions">
      <button class="btn-icon" (click)="onEdit()">
        <img src="../../../../../assets/images/icon-ellipsis.svg" alt="More options" />
      </button>
    </div>
  </div>

  <div class="limit-info">
    <span class="label">Maximum of {{ budget().limit | currency: budget().currency }}</span>
  </div>

  <div class="progress-container">
    <div
      class="progress-bar"
      [style.width]="progressWidth()"
      [style.background-color]="budget().theme"
    ></div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="indicator" [style.background-color]="budget().theme"></div>
      <div class="details">
        <span class="label">Spent</span>
        <span class="value">{{ budget().spent | currency: budget().currency }}</span>
      </div>
    </div>
    <div class="stat-item">
      <div class="indicator bg-beige"></div>
      <div class="details">
        <span class="label">Remaining</span>
        <span class="value">{{ budget().remaining | currency: budget().currency }}</span>
      </div>
    </div>
  </div>

  <div class="latest-spending">
    <div class="spending-header">
      <h3>Latest Spending</h3>
      <a href="#" class="view-all">See All</a>
    </div>
    <!-- Latest spending items will be added here once transactions are connected -->
  </div>
</div>
