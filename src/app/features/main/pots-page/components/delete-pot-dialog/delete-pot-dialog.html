<app-modal [title]="'Delete ‘' + pot().name + '’?'" [isOpen]="isOpen()" (closed)="close()">
  <p class="dialog-description">
    Are you sure you want to delete this pot? This action cannot be reversed, and all the data
    inside it will be removed forever.
  </p>

  <div class="actions">
    <button class="btn btn--danger" (click)="confirm()">Yes, Confirm Deletion</button>
    <button class="btn btn--text" (click)="close()">No, Go Back</button>
  </div>
</app-modal>
