<div class="form-field">
  <label [for]="inputId()" class="form-label">
    {{ label() }}
  </label>

  <input
    [id]="inputId()"
    [type]="type()"
    [value]="value()"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [maxLength]="maxLength()"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    class="form-input"
    [class.form-input--error]="hasError()"
  />

  @if (hasError()) {
    <p class="form-error">
      {{ error() }}
    </p>
  }
</div>
